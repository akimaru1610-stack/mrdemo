<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal VR/MR</title>
    <style>
        body { margin: 0; display: flex; background: #000; overflow: hidden; }
        /* 画面を左右に50%ずつ分割 */
        .view { width: 50vw; height: 100vh; overflow: hidden; position: relative; border: 1px solid #333; }
        /* カメラ映像をそれぞれの画面いっぱいに広げる */
        video {
            position: absolute;
            height: 100%;
            left: 50%;
            transform: translateX(-50%); /* 中央寄せ */
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="view"><video id="left" autoplay playsinline></video></div>
    <div class="view"><video id="right" autoplay playsinline></video></div>

    <script>
        // カメラにアクセスする命令
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } // 背面カメラを指定
        })
        .then(stream => {
            // 左右両方のビデオタグにカメラ映像を流し込む
            document.getElementById('left').srcObject = stream;
            document.getElementById('right').srcObject = stream;
        })
        .catch(err => {
            alert("カメラが起動できません: " + err);
        });
    </script>
</body>
</html>
